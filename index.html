<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bimbingan Konseling Journey</title>
  <!-- Font & Ikon -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #f4edfa 0%, #e0d4ee 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app-container {
      max-width: 520px;
      width: 100%;
      background: rgba(255, 245, 250, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 48px;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.5);
      padding: 24px 20px 28px;
      transition: all 0.2s ease;
    }

    /* header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .header-icon {
      background: #7a4f9e;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 6px 12px rgba(120, 70, 160, 0.25);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #2d1b3d;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header h1 span {
      color: #7a4f9e;
      font-weight: 600;
    }

    .header h1 .sub-title {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: #5a4a6b;
      letter-spacing: 0.3px;
    }

    .sub {
      font-size: 14px;
      color: #5a4a6b;
      background: rgba(255, 255, 255, 0.5);
      padding: 4px 14px;
      border-radius: 40px;
      margin-left: auto;
      font-weight: 600;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    /* ilustrasi */
    .journey-illustration {
      display: flex;
      justify-content: center;
      margin: 4px 0 14px;
    }

    .journey-illustration svg {
      width: 100%;
      max-width: 240px;
      height: auto;
      filter: drop-shadow(0 8px 16px rgba(120, 70, 160, 0.12));
    }

    /* tab navigasi */
    .tab-nav {
      display: flex;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 60px;
      padding: 4px;
      margin: 6px 0 16px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .tab-btn {
      flex: 1;
      padding: 12px 6px;
      border: none;
      background: transparent;
      border-radius: 60px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #4a3560;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab-btn i {
      font-size: 16px;
    }

    .tab-btn.active {
      background: white;
      box-shadow: 0 4px 12px rgba(140, 90, 180, 0.15);
      color: #2d1b3d;
    }

    .tab-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.3);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.25s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0.5; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== EDUKASI ===== */
    .edu-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 4px 0 8px;
    }

    .edu-card {
      background: white;
      border-radius: 28px;
      padding: 18px 20px;
      box-shadow: 0 6px 18px rgba(120, 70, 160, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: 0.18s;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .edu-card:hover {
      transform: scale(1.01);
      box-shadow: 0 10px 24px rgba(140, 90, 180, 0.12);
      border-color: #d4b5f0;
    }

    .edu-icon {
      background: #f0e6fb;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #7a4f9e;
      flex-shrink: 0;
    }

    .edu-content {
      flex: 1;
    }

    .edu-content h4 {
      font-size: 16px;
      color: #2b1a3a;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .edu-content p {
      font-size: 14px;
      color: #5f4b73;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .edu-badge {
      background: #e2d3f0;
      color: #4a2d62;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 60px;
      white-space: nowrap;
    }

    /* ===== KONSELING / JURNAL ===== */
    .session-card {
      background: white;
      border-radius: 32px;
      padding: 20px 18px;
      margin: 0 0 16px;
      box-shadow: 0 8px 24px rgba(140, 90, 180, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .session-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      color: #2b1a3a;
      margin-bottom: 14px;
    }

    .session-title i {
      color: #b48ad9;
      font-size: 20px;
      width: 28px;
    }

    .mood-grid {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mood-btn {
      background: #f4edfa;
      border: none;
      border-radius: 60px;
      padding: 10px 0;
      flex: 1 0 52px;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #3b2a4a;
      font-weight: 600;
    }

    .mood-btn span {
      font-size: 11px;
      margin-top: 2px;
      opacity: 0.7;
      font-weight: 600;
    }

    .mood-btn:hover {
      transform: scale(1.02);
      background: #e8daf5;
    }

    .mood-btn.active {
      background: #c9a7e8;
      box-shadow: 0 6px 14px rgba(160, 100, 200, 0.3);
      color: white;
      transform: scale(1.02);
    }

    .mood-btn.active span {
      color: white;
      opacity: 1;
    }

    textarea {
      width: 100%;
      border: 1px solid #ede3f7;
      border-radius: 28px;
      padding: 16px 18px;
      font-family: 'Quicksand', sans-serif;
      font-size: 15px;
      background: #faf7fe;
      resize: vertical;
      min-height: 90px;
      transition: 0.2s;
      color: #1f142b;
      margin: 12px 0 8px;
    }

    textarea:focus {
      outline: 2px solid #c9a7e8;
      background: white;
      box-shadow: 0 0 0 6px rgba(190, 140, 230, 0.15);
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin: 6px 0 4px;
    }

    .btn-primary, .btn-outline, .btn-wa {
      flex: 1;
      padding: 14px 8px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 15px;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.15s;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: #b48ad9;
      color: white;
      box-shadow: 0 8px 18px rgba(150, 90, 190, 0.2);
    }

    .btn-primary:hover {
      background: #a06bc7;
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(130, 70, 170, 0.3);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.7);
      color: #4a3560;
      border: 1px solid #dcc8ed;
      box-shadow: none;
    }

    .btn-outline:hover {
      background: white;
      border-color: #b48ad9;
    }

    .btn-wa {
      background: #25D366;
      color: white;
      box-shadow: 0 6px 14px rgba(37, 211, 102, 0.25);
      flex: 1.2;
    }

    .btn-wa:hover {
      background: #1da959;
      transform: scale(0.98);
    }

    /* journal log */
    .journal-section {
      margin-top: 12px;
      background: rgba(255, 245, 250, 0.5);
      border-radius: 32px;
      padding: 8px 6px 6px;
      backdrop-filter: blur(2px);
    }

    .journal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px 6px 16px;
      font-weight: 600;
      color: #2f1d40;
    }

    .journal-header i {
      color: #a06bc7;
      margin-right: 8px;
    }

    .journal-list {
      max-height: 140px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .journal-item {
      background: rgba(255, 255, 255, 0.7);
      border-radius: 60px;
      padding: 12px 18px;
      margin: 8px 4px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    .journal-item .mood-emoji {
      font-size: 26px;
      min-width: 40px;
      text-align: center;
    }

    .journal-item .entry-text {
      flex: 1;
      font-size: 14px;
      color: #291e34;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .journal-item .entry-time {
      font-size: 12px;
      color: #7c6691;
      background: #efe6f9;
      padding: 4px 14px;
      border-radius: 40px;
      font-weight: 600;
    }

    .empty-journal {
      text-align: center;
      padding: 24px 10px;
      color: #7a648c;
      font-weight: 500;
      font-size: 15px;
    }

    .empty-journal i {
      font-size: 32px;
      opacity: 0.4;
      display: block;
      margin-bottom: 8px;
    }

    /* modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(30, 20, 40, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: white;
      max-width: 440px;
      width: 100%;
      border-radius: 48px;
      padding: 32px 28px 28px;
      box-shadow: 0 40px 70px rgba(0,0,0,0.2);
      animation: modalPop 0.25s ease;
      position: relative;
    }

    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.94); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: #f0e6fb;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      font-size: 18px;
      color: #4a2d62;
      cursor: pointer;
      transition: 0.15s;
    }

    .modal-close:hover {
      background: #dcc8ed;
    }

    .modal-box h2 {
      font-size: 24px;
      color: #2b1a3a;
      margin: 8px 0 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-box h2 i {
      color: #a06bc7;
    }

    .modal-box p {
      color: #3e2d50;
      line-height: 1.7;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .modal-box .tip {
      background: #f5edfc;
      border-radius: 24px;
      padding: 16px 18px;
      font-size: 15px;
      color: #2d1a40;
      border-left: 6px solid #b48ad9;
    }

    .modal-box .tip i {
      color: #a06bc7;
      margin-right: 8px;
    }

    .journal-list::-webkit-scrollbar { width: 4px; }
    .journal-list::-webkit-scrollbar-track { background: #e8ddf2; border-radius: 20px; }
    .journal-list::-webkit-scrollbar-thumb { background: #b48ad9; border-radius: 20px; }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: #8c78a0;
      display: flex;
      justify-content: center;
      gap: 6px;
      align-items: center;
    }

    .ref-link {
      color: #7a4f9e;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px dashed #c9a7e8;
    }

    .ref-link:hover {
      color: #4a2d62;
    }

    @media (max-width: 420px) {
      .app-container { padding: 16px; }
      .mood-btn { flex: 1 0 44px; font-size: 24px; }
      .tab-btn { font-size: 13px; gap: 4px; }
      .tab-btn i { font-size: 14px; }
      .btn-wa { flex: 1; }
      .header h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- header -->
    <div class="header">
      <div class="header-icon"><i class="fas fa-seedling"></i></div>
      <h1>
        Bimbingan Konseling <span>Journey</span>
        <span class="sub-title"><i class="fas fa-heart" style="color: #7a4f9e; margin-right: 4px;"></i> edukasi & konseling</span>
      </h1>
      <div class="sub"><i class="fas fa-calendar-day"></i> hari ini</div>
    </div>

    <!-- ilustrasi -->
    <div class="journey-illustration">
      <svg viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="18" fill="#c9a7e8" opacity="0.3" />
        <circle cx="170" cy="30" r="18" fill="#b48ad9" opacity="0.15" />
        <path d="M40 30 L70 20 L100 40 L130 18 L160 35" stroke="#b48ad9" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 6" />
        <circle cx="40" cy="30" r="6" fill="#b48ad9" />
        <circle cx="100" cy="40" r="6" fill="#a06bc7" />
        <circle cx="160" cy="35" r="6" fill="#b48ad9" />
        <circle cx="70" cy="20" r="4" fill="#d4b5f0" />
        <circle cx="130" cy="18" r="4" fill="#d4b5f0" />
        <path d="M84 44 L92 48 L100 44" stroke="#a06bc7" stroke-width="2" />
      </svg>
    </div>

    <!-- tab navigasi -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="edu"><i class="fas fa-book-open"></i> Edukasi</button>
      <button class="tab-btn" data-tab="konseling"><i class="fas fa-comment-dots"></i> Konseling</button>
    </div>

    <!-- TAB EDUKASI -->
    <div id="tabEdu" class="tab-content active">
      <div style="margin: 4px 0 10px;">
        <p style="color: #3e2d50; font-weight: 500; padding: 0 8px; font-size: 15px;">
          <i class="fas fa-lightbulb" style="color: #b48ad9; margin-right: 8px;"></i>
          Klik materi untuk membaca, lalu hubungi konselor
        </p>
      </div>
      <div class="edu-grid" id="eduGrid">
        <!-- di-render via JS -->
      </div>
    </div>

    <!-- TAB KONSELING (jurnal + WA) -->
    <div id="tabKonseling" class="tab-content">
      <div class="session-card">
        <div class="session-title"><i class="fas fa-smile"></i> Bagaimana perasaanmu?</div>
        <div class="mood-grid" id="moodGrid">
          <button class="mood-btn" data-mood="senang" data-emoji="😊"><span>senang</span></button>
          <button class="mood-btn" data-mood="tenang" data-emoji="😌"><span>tenang</span></button>
          <button class="mood-btn" data-mood="sedih" data-emoji="😔"><span>sedih</span></button>
          <button class="mood-btn" data-mood="cemas" data-emoji="😰"><span>cemas</span></button>
          <button class="mood-btn" data-mood="marah" data-emoji="😤"><span>marah</span></button>
        </div>
        <textarea id="reflectionInput" placeholder="Tulis cerita atau keluhanmu..."></textarea>
        <div class="action-row">
          <button class="btn-primary" id="saveEntryBtn"><i class="fas fa-pen-fancy"></i> Simpan</button>
          <button class="btn-outline" id="clearBtn"><i class="fas fa-undo-alt"></i> Reset</button>
        </div>
        <!-- tombol WA -->
        <div style="margin-top: 14px;">
          <a href="https://wa.me/6281234567890?text=Halo%20kak%2C%20saya%20ingin%20konsultasi%20tentang..." target="_blank" class="btn-wa" style="display: flex; width: 100%;">
            <i class="fab fa-whatsapp"></i> Hubungi Konselor
          </a>
          <p style="font-size: 12px; color: #7c6691; margin-top: 6px; text-align: center;">
            <i class="fas fa-shield-alt"></i> Konseling rahasia & aman
          </p>
        </div>
      </div>

      <div class="journal-section">
        <div class="journal-header">
          <span><i class="fas fa-journal-whills"></i> Catatan konseling</span>
          <span style="font-size: 13px; background: rgba(180,138,217,0.15); padding: 4px 14px; border-radius: 40px;" id="entryCount">0</span>
        </div>
        <div class="journal-list" id="journalList">
          <div class="empty-journal"><i class="fas fa-feather-alt"></i>Belum ada catatan</div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      <i class="fas fa-circle" style="font-size: 6px; color: #7a4f9e;"></i>
      #BKJourney • belajar & tumbuh bersama
      <i class="fas fa-circle" style="font-size: 6px; color: #7a4f9e;"></i>
    </div>
  </div>

  <!-- MODAL EDUKASI -->
  <div class="modal-overlay" id="eduModal">
    <div class="modal-box">
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      <h2 id="modalTitle"><i class="fas fa-book-open"></i> Judul</h2>
      <div id="modalBody">
        <p>Konten edukasi akan muncul di sini.</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- DATA EDUKASI (materi) ----------
      const eduData = [
        {
          id: 1,
          icon: '🧠',
          title: 'Mengenal Stres & Kecemasan',
          summary: 'Stres adalah respons tubuh terhadap tekanan. Pelajari cara mengenali dan mengelolanya.',
          detail: 'Stres dan kecemasan adalah bagian dari kehidupan, namun jika berlebihan bisa mengganggu. Kenali tanda-tandanya: sulit tidur, jantung berdebar, atau pikiran yang berputar. Teknik sederhana: tarik napas dalam 4 detik, tahan 4 detik, hembuskan 4 detik. Lakukan 5 menit setiap pagi. Jika perlu, bicarakan dengan konselor.'
        },
        {
          id: 2,
          icon: '💬',
          title: 'Komunikasi Efektif dengan Teman & Keluarga',
          summary: 'Belajar mendengarkan dan menyampaikan perasaan dengan jelas adalah kunci hubungan sehat.',
          detail: 'Komunikasi yang baik dimulai dari mendengarkan tanpa menghakimi. Gunakan pernyataan "saya" untuk mengungkapkan perasaan, misalnya "Saya merasa sedih ketika..." Hindari menyalahkan dan berikan ruang bagi orang lain untuk berbicara. Latih empati setiap hari.'
        },
        {
          id: 3,
          icon: '🌿',
          title: 'Self-Compassion: Bersikap Baik pada Diri',
          summary: 'Perlakukan dirimu seperti kamu memperlakukan teman baik. Ini adalah pondasi kesehatan mental.',
          detail: 'Self-compassion berarti menerima diri sendiri dengan segala kekurangan. Ketika gagal, jangan menghakimi diri secara berlebihan. Ucapkan kalimat penyemangat, "Saya melakukan yang terbaik". Penelitian menunjukkan bahwa self-compassion mengurangi stres dan meningkatkan resiliensi.'
        },
        {
          id: 4,
          icon: '🧘',
          title: 'Mindfulness untuk Pemula',
          summary: 'Mindfulness membantu kita hadir di saat ini. Praktik sederhana untuk menenangkan pikiran.',
          detail: 'Mindfulness adalah kesadaran penuh pada momen sekarang. Mulailah dengan pernapasan: tarik napas dalam 4 detik, tahan 4 detik, hembuskan 4 detik. Lakukan 5 menit setiap hari. Sadari sensasi tubuh dan biarkan pikiran berlalu tanpa menghakimi. Ini menurunkan kecemasan.'
        },
        {
          id: 5,
          icon: '🛡️',
          title: 'Membangun Batasan Sehat',
          summary: 'Batasan adalah cara melindungi energi dan kesejahteraan emosional. Belajar mengatakan "tidak".',
          detail: 'Batasan sehat membantu menjaga hubungan yang seimbang. Kenali apa yang membuatmu tidak nyaman dan sampaikan dengan tegas namun sopan. Contoh: "Saya tidak bisa melakukan itu sekarang". Menjaga batasan bukan berarti egois, tetapi bentuk perawatan diri.'
        }
      ];

      // ---------- DOM REFS ----------
      const moodBtns = document.querySelectorAll('.mood-btn');
      const reflectionInput = document.getElementById('reflectionInput');
      const saveBtn = document.getElementById('saveEntryBtn');
      const clearBtn = document.getElementById('clearBtn');
      const journalList = document.getElementById('journalList');
      const entryCount = document.getElementById('entryCount');
      const eduGrid = document.getElementById('eduGrid');
      const modalOverlay = document.getElementById('eduModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      const modalClose = document.getElementById('modalClose');
      const tabBtns = document.querySelectorAll('.tab-btn');
      const tabEdu = document.getElementById('tabEdu');
      const tabKonseling = document.getElementById('tabKonseling');

      // ---------- STATE JURNAL ----------
      let selectedMood = null;
      let selectedEmoji = '😊';
      let journalEntries = [];

      // ---------- STORAGE ----------
      function loadFromStorage() {
        const stored = localStorage.getItem('bkJourneyData');
        if (stored) {
          try { journalEntries = JSON.parse(stored); } catch(e) { journalEntries = []; }
        } else {
          journalEntries = [
            { mood: 'tenang', emoji: '😌', text: 'Hari ini saya merasa cukup baik.', timestamp: Date.now() - 3600000 },
            { mood: 'sedih', emoji: '😔', text: 'Sedikit cemas dengan ujian, tapi saya siap.', timestamp: Date.now() - 7200000 }
          ];
        }
        journalEntries.sort((a, b) => b.timestamp - a.timestamp);
        renderJournal();
        updateCount();
      }

      function saveToStorage() {
        localStorage.setItem('bkJourneyData', JSON.stringify(journalEntries));
      }

      function renderJournal() {
        if (!journalList) return;
        if (journalEntries.length === 0) {
          journalList.innerHTML = `<div class="empty-journal"><i class="fas fa-feather-alt"></i>Belum ada catatan</div>`;
          return;
        }
        let html = '';
        const items = journalEntries.slice(0, 10);
        for (let entry of items) {
          const timeStr = formatTime(entry.timestamp);
          const moodEmoji = entry.emoji || '😊';
          const text = entry.text ? entry.text : '(tanpa catatan)';
          html += `<div class="journal-item">
            <span class="mood-emoji">${moodEmoji}</span>
            <span class="entry-text">${escapeHtml(text)}</span>
            <span class="entry-time">${timeStr}</span>
          </div>`;
        }
        journalList.innerHTML = html;
      }

      function formatTime(ts) {
        const date = new Date(ts);
        return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function updateCount() {
        if (entryCount) entryCount.textContent = `${journalEntries.length} catatan`;
      }

      function clearMoodActive() {
        moodBtns.forEach(btn => btn.classList.remove('active'));
      }

      function selectMood(btn) {
        clearMoodActive();
        btn.classList.add('active');
        selectedMood = btn.dataset.mood;
        selectedEmoji = btn.dataset.emoji;
      }

      // ---------- JURNAL EVENT ----------
      moodBtns.forEach(btn => {
        btn.addEventListener('click', function() { selectMood(this); });
      });

      function saveEntry() {
        const text = reflectionInput.value.trim();
        if (!selectedMood && text.length === 0) {
          alert('Pilih perasaan atau tulis catatan terlebih dahulu ✦');
          return;
        }
        const mood = selectedMood || 'tenang';
        const emoji = selectedEmoji || '😌';
        const newEntry = {
          mood, emoji,
          text: text || '(tanpa catatan)',
          timestamp: Date.now()
        };
        journalEntries.unshift(newEntry);
        if (journalEntries.length > 30) journalEntries.pop();
        saveToStorage();
        renderJournal();
        updateCount();
        reflectionInput.value = '';
        // biarkan mood tetap agar cepat
      }

      function resetAll() {
        if (journalEntries.length === 0 && reflectionInput.value.trim() === '') return;
        if (confirm('Reset semua catatan? Data akan hilang.')) {
          journalEntries = [];
          saveToStorage();
          renderJournal();
          updateCount();
          reflectionInput.value = '';
          clearMoodActive();
          selectedMood = null;
          selectedEmoji = '😊';
        }
      }

      saveBtn.addEventListener('click', saveEntry);
      clearBtn.addEventListener('click', resetAll);
      reflectionInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          saveEntry();
        }
      });

      // ---------- EDUKASI RENDER ----------
      function renderEdu() {
        if (!eduGrid) return;
        let html = '';
        eduData.forEach(item => {
          html += `
            <div class="edu-card" data-id="${item.id}">
              <div class="edu-icon">${item.icon}</div>
              <div class="edu-content">
                <h4>${item.title}</h4>
                <p>${item.summary}</p>
              </div>
              <span class="edu-badge"><i class="fas fa-chevron-right"></i></span>
            </div>
          `;
        });
        eduGrid.innerHTML = html;
        document.querySelectorAll('.edu-card').forEach(card => {
          card.addEventListener('click', function() {
            const id = parseInt(this.dataset.id);
            const data = eduData.find(d => d.id === id);
            if (data) openModal(data);
          });
        });
      }

      // ---------- MODAL ----------
      function openModal(data) {
        modalTitle.innerHTML = `<i class="fas fa-book-open"></i> ${data.title}`;
        modalBody.innerHTML = `
          <p>${data.detail}</p>
          <div class="tip"><i class="fas fa-heart"></i> ${data.summary}</div>
        `;
        modalOverlay.classList.add('open');
      }

      function closeModal() {
        modalOverlay.classList.remove('open');
      }

      modalClose.addEventListener('click', closeModal);
      modalOverlay.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });

      // ---------- TAB ----------
      function switchTab(tabId) {
        tabBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tab === tabId);
        });
        tabEdu.classList.toggle('active', tabId === 'edu');
        tabKonseling.classList.toggle('active', tabId === 'konseling');
      }

      tabBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          switchTab(this.dataset.tab);
        });
      });

      // ---------- INIT ----------
      loadFromStorage();
      renderEdu();

      console.log('✨ Bimbingan Konseling Journey siap!');
    })();
  </script>
</body>
</html>
